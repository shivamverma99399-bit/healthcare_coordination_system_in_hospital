services:
  - type: web
    name: medpulse-backend
    runtime: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: DJANGO_LOG_LEVEL
        value: INFO
      - key: RUN_SEED_DATA
        value: "0"
      - key: DATABASE_URL
        sync: false
